name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      # Hard-fails the build at 60 days since MODELS_REVIEWED_AT.
      # Warns at 30 days. To unblock, run `/update-models` (or
      # `npm run models:audit:apply`) and commit the refreshed
      # packages/models/ files. Positioned after build so the
      # @dash/models package is available for the import.
      - run: npm run models:check

      - run: npm test

